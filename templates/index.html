<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CipherDrop</title>
    
    <!-- Google Fonts: Outfit for UI, JetBrains Mono for numbers -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">
            <i class="fas fa-play-circle neon-text"></i> Cipher<span>Drop</span>
        </div>
        <nav class="nav-menu">
            <a href="#" class="nav-item active" data-target="view-download">
                <i class="fas fa-cloud-download-alt"></i> İndirme Merkezi
            </a>
            <a href="#" class="nav-item" data-target="view-series" onclick="loadLibrary()">
                <i class="fas fa-tv"></i> Diziler
            </a>
            <a href="#" class="nav-item" data-target="view-movies" onclick="loadLibrary()">
                <i class="fas fa-film"></i> Filmler
            </a>
        </nav>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        
        <!-- DOWNLOAD VIEW -->
        <section id="view-download" class="view active">
            <div class="header">
                <h2>Medya İndir</h2>
            </div>
            
            <div class="glass-panel download-box">
                <div class="input-wrapper">
                    <i class="fas fa-link"></i>
                    <input type="text" id="url-input" placeholder="CipherDrop: Video URL'si yapıştırın...">
                    <!-- Smart Check Indicator -->
                    <div id="url-indicator" class="url-indicator"><i class="fas fa-check-circle"></i></div>
                </div>
                
                <div class="controls-row">
                    <div class="toggle-mode">
                        <span id="label-single" class="active">Tek Bölüm/Film</span>
                        <label class="switch">
                            <input type="checkbox" id="mode-toggle">
                            <span class="slider round"></span>
                        </label>
                        <span id="label-season">Tüm Sezon</span>
                    </div>
                    <button id="btn-download" class="neon-button primary-accent">
                        <i class="fas fa-download"></i> İndirmeyi Başlat
                    </button>
                </div>
            </div>

            <div class="header" style="margin-top: 2rem;">
                <h2>İndirme Kuyruğu</h2>
                <span class="badge" id="queue-count">0 Öğe</span>
            </div>
            
            <div class="glass-panel" style="padding: 0;">
                <div class="queue-list" id="queue-list">
                    <!-- Queue items injected here -->
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>Kuyruk şu an boş.</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- SERIES VIEW -->
        <section id="view-series" class="view">
            <div class="header">
                <h2>İndirilen Diziler</h2>
                <div class="header-actions">
                    <button class="neon-button secondary-accent btn-open-folder" data-path="">
                        <i class="fas fa-folder-open"></i> Klasörü Aç
                    </button>
                    <div class="search-bar glass-input">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-series" placeholder="Dizilerde ara...">
                    </div>
                </div>
            </div>
            <div id="series-grid" class="media-grid"></div>
        </section>

        <!-- MOVIES VIEW -->
        <section id="view-movies" class="view">
            <div class="header">
                <h2>İndirilen Filmler</h2>
                <div class="header-actions">
                    <button class="neon-button secondary-accent btn-open-folder" data-path="Filmler">
                        <i class="fas fa-folder-open"></i> Klasörü Aç
                    </button>
                    <div class="search-bar glass-input">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-movies" placeholder="Filmlerde ara...">
                    </div>
                </div>
            </div>
            <div id="movies-grid" class="media-grid"></div>
        </section>

    </div>

    <!-- EPISODES MODAL -->
    <div id="episodes-modal" class="modal-overlay">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h3 id="ep-show-name">Dizi Adı</h3>
                <button class="close-btn close-modal-ep"><i class="fas fa-times"></i></button>
            </div>
            <div class="episodes-list" id="episodes-list"></div>
        </div>
    </div>

    <!-- CUSTOM VIDEO PLAYER MODAL -->
    <div id="player-modal" class="modal-overlay player-overlay">
        <div class="player-container">
            <div class="player-header">
                <div class="player-titles">
                    <h2 id="player-title">Bölüm Adı</h2>
                    <h4 id="player-subtitle">Dizi/Film</h4>
                </div>
                <button class="close-btn close-player"><i class="fas fa-times"></i></button>
            </div>
            
            <video id="custom-video" preload="metadata">
                Tarayıcınız HTML5 video desteklemiyor.
            </video>
            
            <div class="player-controls">
                <div class="progress-container" id="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <div class="controls-main">
                    <div class="controls-left">
                        <button id="play-pause-btn"><i class="fas fa-play"></i></button>
                        <div class="volume-container">
                            <button id="mute-btn"><i class="fas fa-volume-up"></i></button>
                            <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1">
                        </div>
                        <span class="time-display mono-font"><span id="current-time">00:00</span> / <span id="duration">00:00</span></span>
                    </div>
                    <div class="controls-right">
                        <button id="fullscreen-btn"><i class="fas fa-expand"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- TOAST NOTIFICATION CONTAINER -->
    <div id="toast-container"></div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
